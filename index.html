<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>五種排序法動畫比較</title>

<style>
body {
    text-align: center;
    font-family: Arial;
}

#container {
    display: flex;
    justify-content: center;
    align-items: flex-end;
    height: 300px;
    margin-top: 20px;
}

.bar {
    width: 15px;
    margin: 2px;
    background: steelblue;
}

.active { background: red; }
.sorted { background: green; }
.pivot { background: orange; }
.merge { background: purple; }

button, select {
    margin: 5px;
    padding: 8px 12px;
}
</style>
</head>

<body>

<h2>排序演算法動畫比較（5 in 1）</h2>

<select id="algo">
    <option value="bubble">氣泡排序 Bubble Sort</option>
    <option value="selection">選擇排序 Selection Sort</option>
    <option value="insertion">插入排序 Insertion Sort</option>
    <option value="merge">合併排序 Merge Sort</option>
    <option value="quick">快速排序 Quick Sort</option>
</select>

<button onclick="generateArray()">生成數列</button>
<button onclick="startSort()">開始排序</button>

<div id="container"></div>

<script>
let array = [];
let container = document.getElementById("container");

function sleep(ms){
    return new Promise(r => setTimeout(r, ms));
}

// 建立陣列
function generateArray(){
    container.innerHTML = "";
    array = [];

    for(let i=0;i<30;i++){
        let v = Math.floor(Math.random()*250)+10;
        array.push(v);

        let bar = document.createElement("div");
        bar.classList.add("bar");
        bar.style.height = v + "px";
        container.appendChild(bar);
    }
}

// 更新畫面
function update(bars){
    for(let i=0;i<array.length;i++){
        bars[i].style.height = array[i] + "px";
    }
}

/* ---------------- Bubble Sort ---------------- */
async function bubble(bars){
    for(let i=0;i<array.length;i++){
        for(let j=0;j<array.length-i-1;j++){
            bars[j].classList.add("active");
            bars[j+1].classList.add("active");

            await sleep(30);

            if(array[j]>array[j+1]){
                [array[j],array[j+1]]=[array[j+1],array[j]];
                update(bars);
            }

            bars[j].classList.remove("active");
            bars[j+1].classList.remove("active");
        }
        bars[array.length-i-1].classList.add("sorted");
    }
}

/* ---------------- Selection Sort ---------------- */
async function selection(bars){
    for(let i=0;i<array.length;i++){
        let min=i;

        for(let j=i+1;j<array.length;j++){
            bars[j].classList.add("active");
            await sleep(30);

            if(array[j]<array[min]) min=j;

            bars[j].classList.remove("active");
        }

        [array[i],array[min]]=[array[min],array[i]];
        update(bars);
        bars[i].classList.add("sorted");
    }
}

/* ---------------- Insertion Sort ---------------- */
async function insertion(bars){
    for(let i=1;i<array.length;i++){
        let key=array[i];
        let j=i-1;

        while(j>=0 && array[j]>key){
            array[j+1]=array[j];
            j--;
            update(bars);
            await sleep(30);
        }
        array[j+1]=key;
        update(bars);
    }

    for(let b of bars) b.classList.add("sorted");
}

/* ---------------- Merge Sort ---------------- */
async function mergeSort(l,r,bars){
    if(l>=r) return;
    let m=Math.floor((l+r)/2);
    await mergeSort(l,m,bars);
    await mergeSort(m+1,r,bars);
    await merge(l,m,r,bars);
}

async function merge(l,m,r,bars){
    let temp=[];
    let i=l,j=m+1;

    while(i<=m && j<=r){
        if(array[i]<array[j]) temp.push(array[i++]);
        else temp.push(array[j++]);
    }
    while(i<=m) temp.push(array[i++]);
    while(j<=r) temp.push(array[j++]);

    for(let k=0;k<temp.length;k++){
        array[l+k]=temp[k];
        update(bars);
        await sleep(20);
    }
}

/* ---------------- Quick Sort ---------------- */
async function partition(l,r,bars){
    let pivot=array[r];
    let i=l-1;

    bars[r].classList.add("pivot");

    for(let j=l;j<r;j++){
        bars[j].classList.add("active");
        await sleep(30);

        if(array[j]<pivot){
            i++;
            [array[i],array[j]]=[array[j],array[i]];
            update(bars);
        }

        bars[j].classList.remove("active");
    }

    [array[i+1],array[r]]=[array[r],array[i+1]];
    update(bars);

    bars[r].classList.remove("pivot");
    return i+1;
}

async function quick(l,r,bars){
    if(l<r){
        let p=await partition(l,r,bars);
        await quick(l,p-1,bars);
        await quick(p+1,r,bars);
    }
}

/* ---------------- Controller ---------------- */
async function startSort(){
    let bars=document.getElementsByClassName("bar");
    let type=document.getElementById("algo").value;

    if(type=="bubble") await bubble(bars);
    if(type=="selection") await selection(bars);
    if(type=="insertion") await insertion(bars);
    if(type=="merge") await mergeSort(0,array.length-1,bars);
    if(type=="quick") await quick(0,array.length-1,bars);

    for(let b of bars){
        b.classList.add("sorted");
    }
}

// 初始化
generateArray();
</script>

</body>
</html>
